<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Craftright — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#7ec850; --bg2:#6fb0d8; --accent:#3b3a36;
  --panel:#e7dfc6; --muted:#9aa7a3;
  --shadow: 6px 6px 0 rgba(0,0,0,.25);
}
*{ box-sizing:border-box; }
html,body{
  margin:0; height:100%;
  font-family:'Press Start 2P',monospace;
  background:linear-gradient(180deg,var(--bg2),var(--bg1));
  display:flex; align-items:center; justify-content:center;
}
.panel{
  background:linear-gradient(180deg,var(--panel),#fff);
  border:6px solid var(--accent);
  padding:24px; border-radius:8px;
  box-shadow:var(--shadow);
  width:360px; text-align:center;
}
.panel h2{ font-size:14px; margin:0 0 6px; }
.panel .sub{ font-size:8px; color:var(--muted); margin-bottom:18px; }
.panel input{
  display:block; width:100%; padding:10px; margin-top:10px;
  border:4px solid var(--accent); border-radius:4px;
  font-family:'Press Start 2P',monospace; font-size:10px;
  background:#fff;
  transition: border-color 0.2s;
}
.panel input:focus{ outline:none; border-color:#4caf50; }
.btn{
  display:block; width:100%;
  padding:12px; margin-top:12px;
  border:6px solid var(--accent); border-radius:6px;
  background:linear-gradient(180deg,#f6f2d8,#e7dfc6);
  cursor:pointer; font-size:10px; text-align:center;
  font-family:'Press Start 2P',monospace;
  box-shadow:var(--shadow);
  transition: transform 0.1s;
}
.btn:active{ transform:translate(2px,2px); box-shadow:none; }
.btn.secondary{
  background:linear-gradient(180deg,#c8e6c9,#a5d6a7);
  font-size:9px;
}
.divider{ margin:14px 0; font-size:8px; color:var(--muted); }
#auth-msg{ font-size:8px; color:red; margin-top:10px; min-height:16px; }
.logo-icon{
  width:48px; height:48px;
  background:linear-gradient(180deg,#c69c6d,#a87b47);
  border:4px solid var(--accent);
  display:inline-flex; align-items:center; justify-content:center;
  font-size:12px; margin-bottom:10px;
}
</style>
</head>
<body>

<div class="panel">
  <div class="logo-icon">⛏️</div>
  <h2>Craftright</h2>
  <div class="sub">Study • Play • Level Up</div>

  <input id="email" type="email" placeholder="Email" autocomplete="email">
  <input id="password" type="password" placeholder="Password" autocomplete="current-password">

  <div class="btn" id="submit">▶ Login</div>

  <div class="divider">— OR —</div>

  <div class="btn secondary" id="newAccountBtn">+ New Account</div>

  <div id="auth-msg"></div>
</div>

<script type="module" src="Loginfirebase.js"></script>
<script>
  // Non-module helper for register redirect
  document.getElementById("newAccountBtn").addEventListener("click", () => {
    window.location.href = "Register.html";
  });
</script>
</body>
</html>
